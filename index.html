<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LLM Tracker — Latest AI Model Releases</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">🤖</span>
        <span class="logo-text">LLM Tracker</span>
      </div>
      <p class="tagline">Tracking the latest AI model releases across major providers</p>
    </div>
    <div class="header-actions">
      <div id="auth-area" class="auth-area">
        <!-- Logged out -->
        <div id="auth-logged-out" class="auth-logged-out">
          <button class="btn btn-sm" id="btn-show-login">Log in</button>
          <button class="btn btn-sm btn-primary" id="btn-show-register">Sign up</button>
        </div>
        <!-- Logged in -->
        <div id="auth-logged-in" class="auth-logged-in" style="display:none;">
          <label class="notify-toggle" title="Receive email notifications for new LLM releases">
            <input type="checkbox" id="notify-checkbox" checked />
            <span>📧 Notify me</span>
          </label>
          <span id="user-email" class="user-email"></span>
          <button class="btn btn-sm" id="btn-logout">Log out</button>
        </div>
      </div>
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle light/dark mode">
        <span id="theme-toggle-icon">☀️</span>
        <span id="theme-toggle-label">Light</span>
      </button>
    </div>
  </header>

  <!-- Auth Modal -->
  <div id="auth-modal" class="modal-overlay" style="display:none;">
    <div class="modal-card">
      <button class="modal-close" id="modal-close">&times;</button>
      <h2 id="modal-title">Log in</h2>
      <form id="auth-form" autocomplete="on">
        <label for="auth-email">Email</label>
        <input type="email" id="auth-email" name="email" required autocomplete="email" />
        <label for="auth-password">Password</label>
        <input type="password" id="auth-password" name="password" required minlength="8" autocomplete="current-password" />
        <div id="auth-error" class="auth-error" style="display:none;"></div>
        <button type="submit" class="btn btn-primary btn-full" id="auth-submit">Log in</button>
      </form>
      <p class="modal-switch" id="modal-switch"></p>
    </div>
  </div>

  <main class="container">
    <!-- Latest Releases Feed -->
    <section class="section">
      <h2 class="section-title">
        <span class="section-icon">🚀</span> Latest Releases
      </h2>
      <div id="latest-feed" class="latest-feed">
        <div class="loading">Loading latest releases…</div>
      </div>
    </section>

    <!-- Provider Cards -->
    <section class="section">
      <h2 class="section-title">
        <span class="section-icon">🏢</span> Providers
      </h2>
      <div id="providers-grid" class="providers-grid">
        <div class="loading">Loading providers…</div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>
      Updated automatically by
      <a href="https://github.com/JohanSjogren10/LLM-tracker" target="_blank" rel="noopener">GitHub Actions</a>
      · Data sourced from official provider announcements
    </p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
