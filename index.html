<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LLM Tracker — Latest AI Model Releases</title>
  <style>
    /* ─── Reset & Base ────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --border:    #30363d;
      --text:      #e6edf3;
      --muted:     #8b949e;
      --accent:    #58a6ff;
      --accent-2:  #3fb950;
      --card-hover:#1f2937;

      /* provider colours */
      --openai:    #10a37f;
      --anthropic: #cc785c;
      --google:    #4285f4;
      --meta:      #0866ff;
      --mistral:   #ff7000;
      --xai:       #ffffff;
      --cohere:    #39d3c3;
      --other:     #a371f7;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                   "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ─── Header ──────────────────────────────────────────────────────── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1.25rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.75rem;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-left { display: flex; align-items: center; gap: 0.75rem; }

    .logo {
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .badge {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 0.15rem 0.5rem;
      border-radius: 9999px;
      background: #1f6feb33;
      border: 1px solid var(--accent);
      color: var(--accent);
      white-space: nowrap;
    }

    .header-meta {
      font-size: 0.8rem;
      color: var(--muted);
    }

    .header-meta span { color: var(--accent-2); font-weight: 500; }

    /* ─── Main layout ─────────────────────────────────────────────────── */
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
    }

    /* ─── Search / Filter bar ─────────────────────────────────────────── */
    .controls {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-bottom: 2rem;
      align-items: center;
    }

    .search-wrapper {
      position: relative;
      flex: 1;
      min-width: 180px;
      max-width: 360px;
    }

    .search-wrapper svg {
      position: absolute;
      left: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    #searchInput {
      width: 100%;
      padding: 0.5rem 0.75rem 0.5rem 2.25rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.875rem;
      outline: none;
      transition: border-color 0.15s;
    }
    #searchInput:focus { border-color: var(--accent); }
    #searchInput::placeholder { color: var(--muted); }

    .filter-pills {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .pill {
      padding: 0.3rem 0.85rem;
      border-radius: 9999px;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      transition: all 0.15s;
    }
    .pill:hover { border-color: var(--accent); color: var(--text); }
    .pill.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #000;
    }

    /* ─── Provider sections ───────────────────────────────────────────── */
    .provider-section { margin-bottom: 2.5rem; }

    .provider-header {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .provider-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .provider-name {
      font-size: 1.1rem;
      font-weight: 600;
    }

    .provider-count {
      margin-left: auto;
      font-size: 0.75rem;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 9999px;
      padding: 0.1rem 0.5rem;
    }

    /* ─── Card grid ───────────────────────────────────────────────────── */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      position: relative;
      overflow: hidden;
    }
    .card:hover {
      background: var(--card-hover);
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .card-accent-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      border-radius: 10px 10px 0 0;
    }

    .card-name {
      font-size: 1rem;
      font-weight: 700;
      margin-top: 0.25rem;
    }

    .card-date {
      font-size: 0.75rem;
      color: var(--muted);
    }

    .card-desc {
      font-size: 0.85rem;
      color: var(--muted);
      flex: 1;
      line-height: 1.45;
    }

    .card-link {
      font-size: 0.8rem;
      font-weight: 500;
      margin-top: 0.25rem;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
    }

    /* ─── Empty / loading state ───────────────────────────────────────── */
    .state-msg {
      text-align: center;
      color: var(--muted);
      padding: 3rem 1rem;
      font-size: 0.95rem;
    }

    /* ─── Footer ──────────────────────────────────────────────────────── */
    footer {
      text-align: center;
      padding: 1.5rem;
      font-size: 0.8rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
    }

    /* ─── Responsive ──────────────────────────────────────────────────── */
    @media (max-width: 600px) {
      header { padding: 1rem; }
      main   { padding: 1.25rem 1rem 3rem; }
      .card-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- ─── Header ──────────────────────────────────────────────────────────── -->
<header>
  <div class="header-left">
    <span class="logo">🤖 LLM Tracker</span>
    <span class="badge">LIVE</span>
  </div>
  <div class="header-meta">
    Last updated: <span id="lastUpdated">—</span>
  </div>
</header>

<!-- ─── Main ────────────────────────────────────────────────────────────── -->
<main>
  <!-- Controls -->
  <div class="controls">
    <div class="search-wrapper">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input id="searchInput" type="search" placeholder="Search models…" />
    </div>
    <div class="filter-pills" id="filterPills">
      <button class="pill active" data-provider="all">All</button>
    </div>
  </div>

  <!-- Model sections rendered here -->
  <div id="content">
    <div class="state-msg">Loading models…</div>
  </div>
</main>

<footer>
  Data auto-updated daily via GitHub Actions ·
  <a href="https://github.com/JohanSjogren10/LLM-tracker" target="_blank" rel="noopener">
    View on GitHub
  </a>
</footer>

<script>
/* ─────────────────────────────────────────────────────────────────────────
   Provider metadata: colours and display names
───────────────────────────────────────────────────────────────────────── */
const PROVIDER_META = {
  OpenAI:    { color: '#10a37f', emoji: '🟢' },
  Anthropic: { color: '#cc785c', emoji: '🟤' },
  Google:    { color: '#4285f4', emoji: '🔵' },
  Meta:      { color: '#0866ff', emoji: '🔵' },
  Mistral:   { color: '#ff7000', emoji: '🟠' },
  xAI:       { color: '#e6edf3', emoji: '⚪' },
  Cohere:    { color: '#39d3c3', emoji: '🩵' },
};

function providerColor(name) {
  return (PROVIDER_META[name] || { color: '#a371f7' }).color;
}

/* ─────────────────────────────────────────────────────────────────────────
   Date formatting
───────────────────────────────────────────────────────────────────────── */
function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
}

/* ─────────────────────────────────────────────────────────────────────────
   Build a single model card
───────────────────────────────────────────────────────────────────────── */
function buildCard(model) {
  const color = providerColor(model.provider);
  return `
    <article class="card">
      <div class="card-accent-bar" style="background:${color}"></div>
      <div class="card-name">${escHtml(model.name)}</div>
      <div class="card-date">📅 ${fmtDate(model.release_date)}</div>
      ${model.description
        ? `<p class="card-desc">${escHtml(model.description)}</p>`
        : ''}
      ${model.announcement_url
        ? `<a class="card-link" href="${escHtml(model.announcement_url)}"
              target="_blank" rel="noopener">
             View announcement
             <svg width="11" height="11" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="2.5">
               <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
               <polyline points="15 3 21 3 21 9"/>
               <line x1="10" y1="14" x2="21" y2="3"/>
             </svg>
           </a>`
        : ''}
    </article>`;
}

/* ─────────────────────────────────────────────────────────────────────────
   Escape HTML
───────────────────────────────────────────────────────────────────────── */
function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

/* ─────────────────────────────────────────────────────────────────────────
   Render
───────────────────────────────────────────────────────────────────────── */
let allModels   = [];
let activeFilter = 'all';

function render(models) {
  const content = document.getElementById('content');
  if (!models.length) {
    content.innerHTML = '<div class="state-msg">No models found.</div>';
    return;
  }

  // Group by provider, sort providers alphabetically
  const groups = {};
  for (const m of models) {
    const p = m.provider || 'Other';
    if (!groups[p]) groups[p] = [];
    groups[p].push(m);
  }

  const html = Object.keys(groups).sort().map(provider => {
    const color = providerColor(provider);
    const cards = groups[provider]
      .slice()
      .sort((a, b) => new Date(b.release_date) - new Date(a.release_date))
      .map(buildCard)
      .join('');
    return `
      <section class="provider-section">
        <div class="provider-header">
          <div class="provider-dot" style="background:${color}"></div>
          <span class="provider-name">${escHtml(provider)}</span>
          <span class="provider-count">${groups[provider].length} model${groups[provider].length !== 1 ? 's' : ''}</span>
        </div>
        <div class="card-grid">${cards}</div>
      </section>`;
  }).join('');

  content.innerHTML = html;
}

function applyFilters() {
  const query = document.getElementById('searchInput').value.toLowerCase();
  let filtered = allModels;

  if (activeFilter !== 'all') {
    filtered = filtered.filter(m => m.provider === activeFilter);
  }
  if (query) {
    filtered = filtered.filter(m =>
      (m.name        || '').toLowerCase().includes(query) ||
      (m.provider    || '').toLowerCase().includes(query) ||
      (m.description || '').toLowerCase().includes(query)
    );
  }
  render(filtered);
}

/* ─────────────────────────────────────────────────────────────────────────
   Filter pills
───────────────────────────────────────────────────────────────────────── */
function buildPills(models) {
  const providers = [...new Set(models.map(m => m.provider))].sort();
  const pills = document.getElementById('filterPills');
  providers.forEach(p => {
    const btn = document.createElement('button');
    btn.className = 'pill';
    btn.dataset.provider = p;
    btn.textContent = p;
    pills.appendChild(btn);
  });

  pills.addEventListener('click', e => {
    const btn = e.target.closest('.pill');
    if (!btn) return;
    pills.querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.provider;
    applyFilters();
  });
}

/* ─────────────────────────────────────────────────────────────────────────
   Fetch models.json and bootstrap
───────────────────────────────────────────────────────────────────────── */
async function init() {
  try {
    const res  = await fetch('models.json?v=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();

    allModels = data.models || [];

    // Last updated
    if (data.last_updated) {
      document.getElementById('lastUpdated').textContent = fmtDate(data.last_updated);
    }

    buildPills(allModels);
    render(allModels);

    document.getElementById('searchInput').addEventListener('input', applyFilters);
  } catch (err) {
    console.error(err);
    document.getElementById('content').innerHTML =
      `<div class="state-msg">⚠️ Failed to load model data. Please try refreshing.</div>`;
  }
}

init();
</script>
</body>
</html>
