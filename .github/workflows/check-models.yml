name: Check for New LLM Models

on:
  schedule:
    # Runs daily at 08:00 UTC
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-models:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run model checker
        id: check
        env:
          SMTP_SERVER: smtp.gmail.com
          SMTP_PORT: '587'
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.NOTIFICATION_EMAIL_PASSWORD }}
          NOTIFY_EMAIL: Johan.sjogren@tieto.com
        run: python scripts/check_models.py

      - name: Commit updated models.json (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet data/models.json; then
            echo "No changes to models.json"
          else
            git add data/models.json
            git commit -m "chore: update models.json with new releases [skip ci]"
            git push
          fi
